onboarding = false

[worktrees]
directory = "~/.herdr/worktrees"

[session]
resume_agents_on_restore = true

[remote]
manage_ssh_config = true

[ui]
sidebar_width = 50
sidebar_min_width = 50
sidebar_max_width = 50
mouse_capture = false
agent_panel_sort = "priority"
show_agent_labels_on_pane_borders = true

[ui.toast]
delivery = "system"
delay_seconds = 1

[keys]
open_worktree = ""
remove_worktree = "prefix+alt+d"
previous_workspace = "prefix+shift+left"
next_workspace = "prefix+shift+right"
switch_workspace = "prefix+shift+1..9"
previous_agent = "prefix+alt+0"

[[keys.command]]
key = "prefix+shift+o"
type = "pane"
command = "/Users/cataengineer/.config/herdr/scripts/open-worktree-branch-or-pr"
description = "open worktree, remote branch, or PR"

[[keys.command]]
key = "prefix+shift+p"
type = "pane"
command = "printf 'Workspace directory: '; read dir; [ -n \"$dir\" ] && herdr workspace create --cwd \"$dir\" --label \"$(basename \"$dir\")\""
description = "new workspace from input dir"

[[keys.command]]
key = "prefix+shift+a"
type = "pane"
command = "/Users/cataengineer/.config/herdr/scripts/send-active-buffer-to-agent"
description = "send context curr pane"

[[keys.command]]
key = "prefix+shift+u"
type = "shell"
command = "/Users/cataengineer/.config/herdr/scripts/open-current-pr"
description = "open curr PR in browser"

[[keys.command]]
key = "prefix+shift+y"
type = "shell"
command = "/Users/cataengineer/.config/herdr/scripts/sync-all-pr-worktree-labels"
description = "sync all PR worktree labels"

[theme]
name = "dracula"
auto_switch = false
